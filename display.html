<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Info Display</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5faff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    table {
      border-collapse: collapse;
      width: 60%;
      max-width: 600px;
      background: white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    th, td {
      padding: 15px;
      text-align: center;
      border: 1px solid #ddd;
      font-size: 1rem;
    }
    th {
      background-color: #004aad;
      color: white;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <th>Username</th>
      <th>Password</th>
    </tr>
    <tr>
      <td id="showUsername">--</td>
      <td id="showPassword">--</td>
    </tr>
  </table>

  <script>
    document.getElementById('showUsername').textContent = localStorage.getItem('username') || 'N/A';
    document.getElementById('showPassword').textContent = localStorage.getItem('password') || 'N/A';
  </script>
</body>
</html>
