<!-- Save this as display.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Info</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f8ff;
    }
    table {
      border-collapse: collapse;
      width: 50%;
      background: white;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: #004aad;
      color: white;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <th>Username</th>
      <th>Password</th>
    </tr>
    <tr>
      <td id="displayUsername"></td>
      <td id="displayPassword"></td>
    </tr>
  </table>

  <script>
    document.getElementById('displayUsername').textContent = localStorage.getItem('username') || 'N/A';
    document.getElementById('displayPassword').textContent = localStorage.getItem('password') || 'N/A';
  </script>
</body>
</html>
